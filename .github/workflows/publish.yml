name: Publish

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release with the built-in token
      id-token: write # npm trusted publishing (OIDC) + provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need tags for `git describe`

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      # Cache downloaded SVGs so recurring publishes only fetch changed icons.
      # Keyed by the metadata snapshot; restore-keys reuse the prior cache and
      # fetch just the delta when icons change.
      - name: Cache icon SVGs
        uses: actions/cache@v4
        with:
          path: .cache
          key: msr-svg-${{ hashFiles('_data/icons.json') }}
          restore-keys: |
            msr-svg-

      # `build` runs `generate` (via prebuild) to fetch icons and emit dist.
      - name: Build
        run: npm run build

      # OIDC trusted publishing: npm exchanges the GitHub OIDC token for a
      # short-lived credential and attaches provenance. No NPM_TOKEN needed.
      # Idempotent: skip if this exact version is already on npm (e.g. a re-run).
      - name: Publish to npm
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          if npm view "$name@$version" version >/dev/null 2>&1; then
            echo "npm already has $name@$version — skipping publish."
          else
            npm publish --access public --provenance
          fi

      # Create the GitHub Release for the version in package.json (NOT `git
      # describe`, which can resolve to an unrelated older tag on a manual run).
      # Ensures the matching tag exists, then creates the release. Built-in token.
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          version=$(node -p "require('./package.json').version")
          tag="v$version"
          if ! git rev-parse "$tag" >/dev/null 2>&1; then
            git tag "$tag"
            git push origin "$tag"
          fi
          gh release view "$tag" >/dev/null 2>&1 \
            || gh release create "$tag" --generate-notes
