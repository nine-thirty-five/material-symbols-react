name: Auto Update

on:
  schedule:
    - cron: '0 0 * * 1' # Runs at 12:00 AM UTC every Monday
  workflow_dispatch:
    inputs:
      force:
        description: Force Update
        default: '0'
      dry:
        description: Dry Run
        default: '0'
      bump:
        type: choice
        description: Bump Version
        options:
          - patch
          - minor
          - major

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # commit the bumped version + push the tag
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: git-actions/set-user@v1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Install dependencies
        run: npm ci

      - id: update
        run: |
          force="${{ github.event.inputs.force }}"
          dry="${{ github.event.inputs.dry }}"
          bump="${{ github.event.inputs.bump }}"
          [ -z "$bump" ] && bump="patch"

          # Snapshot the current icon set, then refresh from Google's official metadata.
          git show HEAD:_data/icons.json > /tmp/old-icons.json 2>/dev/null || echo "[]" > /tmp/old-icons.json
          npm run metadata

          # No change to the official icon/category/tag set -> nothing to publish.
          if git diff --quiet -- _data/icons.json && [ "$force" != "1" ]; then
            echo "trigger_release=no" >> "$GITHUB_OUTPUT"
            echo "No icon changes."
            exit 0
          fi

          # If any previously-shipped icon was removed, treat it as a minor bump
          # (unless an explicit bump was requested via workflow_dispatch).
          if [ -z "${{ github.event.inputs.bump }}" ]; then
            removed=$(node -e "
              const fs=require('fs');
              const oldArr=JSON.parse(fs.readFileSync('/tmp/old-icons.json','utf8'));
              const next=require('./_data/icons.json');
              const names=new Set(next.map(i=>i.name));
              console.log(oldArr.filter(i=>!names.has(i.name)).length);
            ")
            [ "$removed" -gt 0 ] && bump="minor"
          fi

          # Stage the refreshed snapshot; `npm version` commits it with the tag.
          git add _data/icons.json
          npm version "$bump" -m "build: auto update to v%s" --force

          if [ "$dry" = "1" ]; then
            echo "trigger_release=no" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git push --follow-tags
          echo "trigger_release=yes" >> "$GITHUB_OUTPUT"
    outputs:
      trigger_release: ${{ steps.update.outputs.trigger_release }}

  trigger-publish:
    runs-on: ubuntu-latest
    needs: update
    if: needs.update.outputs.trigger_release == 'yes'
    permissions:
      actions: write # dispatch the Publish workflow (built-in token; no PAT)
    steps:
      - name: Trigger Publish
        uses: benc-uk/workflow-dispatch@v1
        with:
          workflow: Publish
          token: ${{ github.token }}
